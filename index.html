<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antony Frackowiak</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      color: white;
      background: url('fond.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      font-weight: 700;
      margin-bottom: 0.5em;
      text-transform: uppercase;
    }

    p {
      font-size: 1.5em;
      font-weight: 300;
      max-width: 600px;
    }

    img {
      width: 300px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9em;
      color: #ccc;
    }

    a {
      color: #ccc;
      text-decoration: none;
    }

    a:hover {
      color: white;
    }
  </style>
</head>
<body>
  <h1>Je m'appelle Antony Frackowiak</h1>
  <p>Bienvenue sur mon site personnel ! Passionné par l'Astrophysique et la Cosmologie.</p>
  <p>  ! Il est en construction... ! </p>
  <img src="photo.jpg" alt="Photo personnelle">

  <footer>
    <p>© 2025 Antony Frackowiak – <a href="https://github.com/AntonyFrackowiak" target="_blank">GitHub</a></p>
  </footer>

</html>
